name: Medical News Reels Bot

on:
  schedule:
    # Reach Strategy: 3 Reels per day (8-hour intervals)
    - cron: '17 0 * * *'  # Early Morning (Asia) / Late Night (US)
    - cron: '17 8 * * *'  # Morning (EU) / Night (Asia)
    - cron: '17 16 * * *' # Morning (US) / Evening (EU)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in Dry Run mode (No Instagram posting)'
        required: false
        default: false
        type: boolean
      mock:
        description: 'Use Mock Content'
        required: false
        default: false
        type: boolean

jobs:
  run-reels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Specific for Reels
          pip install imageio-ffmpeg

      - name: Run Reels Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          IG_SESSION: ${{ secrets.IG_SESSION }}
        run: |
          ARGS="--reels-only"
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.mock }}" == "true" ]; then
            ARGS="$ARGS --mock"
          fi
          python main.py $ARGS

      - name: Commit and Push Updated DB
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[Bot] Update posted_articles.json (Reels)"
          file_pattern: "posted_articles.json"
