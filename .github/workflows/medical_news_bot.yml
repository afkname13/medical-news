name: Medical News Instagram Bot

permissions:
  contents: write

on:
  schedule:
    # UTC schedule tuned for English-speaking audiences.
    # Approx local targets:
    # - 13:17 UTC = 9:17 AM ET / 6:17 AM PT / 1:17 PM UK
    # - 17:17 UTC = 1:17 PM ET / 10:17 AM PT / 5:17 PM UK
    # - 23:17 UTC = 7:17 PM ET / 4:17 PM PT / 11:17 PM UK
    - cron: '17 13 * * *'
    - cron: '17 17 * * *'
    - cron: '17 23 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in Dry Run mode (No Instagram posting)'
        required: false
        default: false
        type: boolean
      mock:
        description: 'Use Mock Content (No Gemini AI quota used)'
        required: false
        default: false
        type: boolean

concurrency:
  group: medical-news-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TZ: UTC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ github.token }}
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Caching pip dependencies

      - name: Cache Playwright browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run Medical News Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          IG_SESSION: ${{ secrets.IG_SESSION }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.mock }}" == "true" ]; then
            ARGS="$ARGS --mock"
          fi
          python main.py $ARGS

      - name: Upload Debug Artifacts On Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: medical-news-debug-${{ github.run_id }}
          path: |
            media/
            posted_articles.json
            used_image_assets.json
          if-no-files-found: ignore

      - name: Commit and Push Updated DB
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[Bot] Update posting state"
          file_pattern: "posted_articles.json used_image_assets.json"
          skip_fetch: true
