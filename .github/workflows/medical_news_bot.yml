name: Medical News Instagram Bot

on:
  schedule:
    # Slot 1: Reel (Early Morning Asia / Late Night US) - Hits fresh news cycle
    - cron: '17 0 * * *'
    # Slot 2: Carousel (Morning Peak EU / Night US) - High context retention
    - cron: '17 6 * * *'
    # Slot 3: Reel (Mid-day EU / Morning Peak US) - Discovery reach
    - cron: '17 12 * * *'
    # Slot 4: Carousel (Evening Peak EU / Afternoon US) - Deep dive engagement
    - cron: '17 18 * * *'
    # Slot 5: Reel (Late Night EU / Evening Peak US) - Viral night-owl reach
    - cron: '17 22 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in Dry Run mode (No Instagram posting)'
        required: false
        default: false
        type: boolean
      mock:
        description: 'Use Mock Content (No Gemini AI quota used)'
        required: false
        default: false
        type: boolean

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Caching pip dependencies

      - name: Cache Playwright browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: Run Medical News Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          IG_SESSION: ${{ secrets.IG_SESSION }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.mock }}" == "true" ]; then
            ARGS="$ARGS --mock"
          fi
          
          # GROWTH STRATEGY: 2 Posts (Carousels) + 3 Reels
          # We check the hour of execution (UTC) to decide format
          HOUR=$(date -u +%H)
          if [ "$HOUR" == "06" ] || [ "$HOUR" == "18" ]; then
            echo "⏰ Slot detected: Carousel (Retention Focus)"
            ARGS="$ARGS --carousel-only"
          else
            echo "⏰ Slot detected: Reel (Reach Focus)"
            ARGS="$ARGS --reels-only"
          fi
          
          python main.py $ARGS

      - name: Commit and Push Updated DB
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[Bot] Update posted_articles.json"
          file_pattern: "posted_articles.json"
