name: Medical News Instagram Bot

on:
  schedule:
    # 10:17 PM KST (Shifting from 10 PM to avoid traffic)
    - cron: '17 13 * * *'
    # 3:42 AM KST (Shifting from 3 AM)
    - cron: '42 18 * * *'
    # 10:47 AM KST (Shifting from 11 AM to pre-empt delays)
    - cron: '47 1 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in Dry Run mode (No Instagram posting)'
        required: false
        default: false
        type: boolean
      mock:
        description: 'Use Mock Content (No Gemini AI quota used)'
        required: false
        default: false
        type: boolean

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Caching pip dependencies

      - name: Cache Playwright browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: Run Medical News Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          IG_SESSION: ${{ secrets.IG_SESSION }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.mock }}" == "true" ]; then
            ARGS="$ARGS --mock"
          fi
          python main.py $ARGS

      - name: Commit and Push Updated DB
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[Bot] Update posted_articles.json"
          file_pattern: "posted_articles.json"
